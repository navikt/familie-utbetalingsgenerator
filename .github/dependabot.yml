version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 4
      exclude:
        - "no.nav.familie*"
    open-pull-requests-limit: 30
    groups:
      all-dependencies:
        patterns:
          - "*"
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 4
      exclude:
        - "no.nav.familie*"
    open-pull-requests-limit: 30
    groups:
      all-dependencies:
        patterns:
          - "*"
